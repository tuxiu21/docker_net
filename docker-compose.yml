services:
  vpn:
    image: alpine:3.20
    container_name: vpn
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    environment:
      - VPN_USER=${VPN_USER:-}
      - VPN_PASS=${VPN_PASS:-}
    volumes:
      - ./1757298463444.ovpn:/vpn/vpn.conf.orig:ro
    command:
      - sh
      - -c
      - |
        apk add --no-cache openvpn >/dev/null &&
        printf '%s\n%s\n' "$$VPN_USER" "$$VPN_PASS" > /tmp/auth.txt &&
        chmod 600 /tmp/auth.txt &&
        sed 's|^auth-user-pass.*|auth-user-pass /tmp/auth.txt|' /vpn/vpn.conf.orig > /tmp/vpn.conf &&
        exec openvpn --config /tmp/vpn.conf
    ports:
      - "1080:1080"
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8

  socks5:
    image: serjs/go-socks5-proxy
    container_name: socks5
    network_mode: "service:vpn"
    environment:
      - PROXY_PORT=1080
    depends_on:
      - vpn
    restart: unless-stopped
